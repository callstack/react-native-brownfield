name: iOS E2E (AppleApp — Vanilla)
description: Package RNApp, build AppleApp, and run Detox end-to-end tests

inputs:
  artifact-name:
    description: 'Name prefix for Detox artifacts uploaded on failure'
    required: false
    default: 'detox-appleapp'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

    - name: Setup
      uses: ./.github/actions/setup

    - name: Prepare iOS environment
      uses: ./.github/actions/prepare-ios

    - name: Install applesimutils
      run: |
        brew tap wix/brew
        brew install applesimutils
      shell: bash

    - name: Restore Pods cache (RNApp)
      uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5
      with:
        path: apps/RNApp/ios/Pods
        key: ${{ runner.os }}-e2e-appleapp-rnapp-pods-${{ hashFiles('apps/RNApp/ios/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-e2e-appleapp-rnapp-pods-

    - name: Brownfield codegen (RNApp)
      run: yarn codegen
      working-directory: apps/RNApp
      shell: bash

    - name: Install CocoaPods (RNApp)
      env:
        RCT_USE_PREBUILT_RNCORE: '0'
      run: pod install
      working-directory: apps/RNApp/ios
      shell: bash

    - name: Package RNApp XCFramework
      run: yarn brownfield:package:ios
      working-directory: apps/RNApp
      shell: bash

    - name: Copy XCFrameworks into AppleApp
      run: node prepareXCFrameworks.js --appName RNApp
      working-directory: apps/AppleApp
      shell: bash

    - name: Restore Detox build cache (AppleApp)
      uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5
      with:
        path: apps/AppleApp/build
        key: ${{ runner.os }}-e2e-appleapp-build-${{ hashFiles('apps/RNApp/ios/Podfile.lock', 'apps/AppleApp/Brownfield Apple App.xcodeproj/project.pbxproj', 'apps/brownfield-example-shared-tests/e2e/**') }}
        restore-keys: |
          ${{ runner.os }}-e2e-appleapp-build-

    - name: Install Detox iOS artifacts
      run: node node_modules/detox/scripts/postinstall.js
      working-directory: apps/AppleApp
      shell: bash

    - name: Detox build (AppleApp Vanilla)
      run: yarn e2e:build:ios
      working-directory: apps/AppleApp
      shell: bash

    - name: Verify embedded JS bundle in BrownfieldLib (E2E)
      run: |
        set -euo pipefail
        PRODUCTS_DIR="apps/AppleApp/build/Build/Products/Debug Vanilla-iphonesimulator"
        APP_PATH="$(find "$PRODUCTS_DIR" -maxdepth 1 -name '*.app' -print -quit)"
        if [[ -z "$APP_PATH" ]]; then
          echo "error: no .app under $PRODUCTS_DIR" >&2
          exit 1
        fi
        BUNDLE_PATH="$APP_PATH/Frameworks/BrownfieldLib.framework/main.jsbundle"
        if [[ ! -f "$BUNDLE_PATH" ]]; then
          echo "error: $BUNDLE_PATH missing — E2E needs the packaged RNApp bundle, not Metro." >&2
          echo "Re-run: yarn brownfield:package:ios (RNApp) && node prepareXCFrameworks.js --appName RNApp" >&2
          exit 1
        fi
        echo "Embedded bundle OK: $BUNDLE_PATH ($(wc -c < "$BUNDLE_PATH") bytes)"
      shell: bash

    - name: Detox test (AppleApp Vanilla)
      run: yarn e2e:test:ios
      working-directory: apps/AppleApp
      shell: bash

    - name: Upload Detox artifacts on failure
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ inputs.artifact-name }}-ios
        path: apps/AppleApp/artifacts
        if-no-files-found: ignore
