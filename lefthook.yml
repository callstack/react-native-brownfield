pre-commit:
  parallel: true
  commands:
    brownfield-navigation-drift:
      run: node --experimental-strip-types --no-warnings ./scripts/check-brownfield-navigation-drift.ts

    lint:
      glob: '*.{js,ts,jsx,tsx}'
      run: yarn lint

    typecheck:
      glob: '*.{js,ts,jsx,tsx}'
      run: yarn typecheck

commit-msg:
  parallel: true
  commands:
    commitlint:
      run: npx commitlint --edit
